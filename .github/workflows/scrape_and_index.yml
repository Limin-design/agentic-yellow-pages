name: Scrape and Index to Azure Search  
  
on:  
  workflow_dispatch:  
  schedule:  
    # Runs every 30 minutes (UTC)  
    - cron: "*/30 * * * *"  
  
jobs:  
  scrape-and-index:  
    runs-on: ubuntu-latest  
    timeout-minutes: 30  
  
    steps:  
      - name: Checkout repo  
        uses: actions/checkout@v4  
  
      - name: Set up Python  
        uses: actions/setup-python@v5  
        with:  
          python-version: "3.11"  
          cache: "pip"  
  
      - name: Install dependencies  
        run: |  
          python -m pip install --upgrade pip  
          pip install -r requirements.txt  
          pip install azure-search-documents python-dotenv beautifulsoup4 requests  
  
      - name: Run scraper  
        env:  
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}  
          SCRAPER_QUERY: ${{ vars.SCRAPER_QUERY }}  
          SCRAPER_MAX_PAGES: ${{ vars.SCRAPER_MAX_PAGES }}  
          RATE_LIMIT_PER_MINUTE: ${{ vars.RATE_LIMIT_PER_MINUTE }}  
          OPENAI_MAX_INPUT_CHARS: ${{ vars.OPENAI_MAX_INPUT_CHARS }}  
          OPENAI_TIMEOUT_MS: ${{ vars.OPENAI_TIMEOUT_MS }}  
        run: |  
          python scraper.py  
  
      - name: Upload to Azure AI Search  
        env:  
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}  
          AZURE_SEARCH_ADMIN_KEY: ${{ secrets.AZURE_SEARCH_ADMIN_KEY }}  
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}  
          SCRAPER_OUTPUT_FILE: scraped.jsonl  
        run: |  
          python index_to_azure_search.py  
  
      - name: Upload scraped artifact (optional)  
        uses: actions/upload-artifact@v4  
        with:  
          name: scraped-jsonl  
          path: scraped.jsonl  
          if-no-files-found: ignore  
