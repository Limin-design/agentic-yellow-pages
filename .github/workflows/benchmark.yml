name: Trust Oracle Benchmark

on:
  schedule:
    # Runs once a day at 12:00 UTC to audit the network
    - cron: '0 12 * * *'
  workflow_dispatch: # This adds the manual "Run workflow" button!

jobs:
  oracle-grading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests python-dotenv
          
      - name: Run The Enterprise Oracle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # The Oracle needs Groq to power the Judge Panel!
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }} 
        run: python benchmark.py
